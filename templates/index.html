<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapp &mdash; Photo Collage Maker</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Collapp</h1>
                <p class="tagline">Photo Collage Maker</p>
            </div>

            <!-- Layout Selection -->
            <div class="sidebar-section">
                <h3 class="section-title">Choose Layout</h3>
                <div class="layout-grid" id="layout-grid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Output Size -->
            <div class="sidebar-section">
                <h3 class="section-title">Output Size</h3>
                <div class="size-controls">
                    <div class="size-input-group">
                        <label for="output-w">Width</label>
                        <input type="number" id="output-w" value="{{ default_width }}" min="100" max="10000">
                    </div>
                    <span class="size-separator">&times;</span>
                    <div class="size-input-group">
                        <label for="output-h">Height</label>
                        <input type="number" id="output-h" value="{{ default_height }}" min="100" max="10000">
                    </div>
                </div>
                <div class="size-presets">
                    <button class="preset-btn" data-w="1080" data-h="1920">9:16</button>
                    <button class="preset-btn" data-w="1080" data-h="1080">1:1</button>
                    <button class="preset-btn" data-w="1920" data-h="1080">16:9</button>
                    <button class="preset-btn" data-w="1080" data-h="1350">4:5</button>
                </div>
            </div>

            <!-- Actions -->
            <div class="sidebar-footer">
                <button id="export-btn" class="export-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Export Collage
                </button>
                <button id="reset-btn" class="reset-btn">Reset</button>
            </div>
        </aside>

        <!-- ===== MAIN CANVAS AREA ===== -->
        <main class="main-area">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <div class="canvas-container" id="canvas">
                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                        </div>
                        <h2>Create Your Collage</h2>
                        <p>Select a layout from the sidebar to get started</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept="image/*" style="display:none">

    <!-- Pass defaults to JS -->
    <script>
        const DEFAULT_WIDTH = {{ default_width }};
        const DEFAULT_HEIGHT = {{ default_height }};
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
